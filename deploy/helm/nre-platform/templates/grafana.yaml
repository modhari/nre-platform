                            "fillOpacity": 10
                        }
                    },
                    "overrides": [
                        {
                            "matcher": {
                                "id": "byName",
                                "options": "safe_action_count"
                            },
                            "properties": [
                                {
                                    "id": "color",
                                    "value": {
                                        "fixedColor": "green",
                                        "mode": "fixed"
                                    }
                                }
                            ]
