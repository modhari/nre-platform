{{- if .Values.grafana.enabled }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasource
  namespace: {{ .Values.global.namespace }}
data:
  datasource.yaml: |
    apiVersion: 1
    datasources:
      - name: InfluxDB-NRE
        type: influxdb
        access: proxy
        url: http://influxdb:8086
        jsonData:
          version: Flux
          organization: nre
          defaultBucket: nre
          tlsSkipVerify: true
        secureJsonData:
          token: {{ .Values.influxdb.adminToken }}
        isDefault: true
        editable: true
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-provider
  namespace: {{ .Values.global.namespace }}
data:
  provider.yaml: |
    apiVersion: 1
    providers:
      - name: nre-platform
        orgId: 1
        folder: NRE Platform
        type: file
        disableDeletion: false
        updateIntervalSeconds: 30
        options:
          path: /var/lib/grafana/dashboards
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-nre
  namespace: {{ .Values.global.namespace }}
data:
  nre-evpn.json: |
    {
        "title": "NRE Platform \u2014 EVPN VXLAN Incidents",
        "uid": "nre-evpn-01",
        "refresh": "30s",
        "time": {
            "from": "now-3h",
            "to": "now"
        },
        "style": "dark",
        "panels": [
            {
                "id": 1,
                "title": "EVPN incident rate by scenario",
                "description": "Each data point is one agent loop iteration detecting an active EVPN fault. Five scenarios classified and planned independently.",
                "type": "timeseries",
                "gridPos": {
                    "x": 0,
                    "y": 0,
                    "w": 24,
                    "h": 8
                },
                "datasource": {
                    "type": "influxdb",
                    "uid": "InfluxDB-NRE"
                },
                "fieldConfig": {
                    "defaults": {
                        "custom": {
                            "lineWidth": 2,
                            "fillOpacity": 15,
                            "spanNulls": false
                        },
                        "color": {
                            "mode": "palette-classic"
                        }
                    }
                },
                "options": {
                    "legend": {
                        "displayMode": "table",
                        "placement": "bottom"
                    }
                },
                "targets": [
                    {
                        "refId": "A",
                        "query": "from(bucket:\"nre\")\n  |> range(start: v.timeRangeStart, stop: v.timeRangeStop)\n  |> filter(fn: (r) => r._measurement == \"nre_evpn_incidents\" and r._field == \"safe_action_count\")\n  |> aggregateWindow(every: 2m, fn: count, createEmpty: false)\n  |> group(columns: [\"scenario\", \"device\"])"
                    }
                ]
            },
            {
                "id": 2,
                "title": "VTEP reachability \u2014 safe vs gated (medium)",
