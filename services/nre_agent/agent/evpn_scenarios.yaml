- scenario: vtep_reachability_analysis
  trigger: vtep_unreachable
  required: [vtep_ip]
  question: "VTEP {vtep_ip} is unreachable from {device} in fabric {fabric}. BGP EVPN session is established but the type-3 IMET route is missing for VNI {vni}. BUM traffic flooding is broken."
  capability: bgp_evpn_peer_state
  risk_class: medium

- scenario: mac_mobility_analysis
  trigger: mac_mobility_storm
  required: [mac, vni, mobility_count]
  question: "MAC address {mac} is flapping in VNI {vni} on {device} in fabric {fabric}. MAC mobility sequence number is {mobility_count}. Remote VTEP binding is {vtep}."
  capability: evpn_mac_vrf_state
  risk_class: medium

- scenario: vni_mismatch_analysis
  trigger: vni_state_down
  required: [vni, vlan]
  question: "VNI {vni} mapped to VLAN {vlan} is operationally {state} on {device} in fabric {fabric}. Possible VLAN-VNI mapping mismatch or missing NVE configuration."
  capability: vxlan_vni_oper_state
  risk_class: high

- scenario: type5_route_analysis
  trigger: type5_leaking
  required: [type5_count]
  question: "Type-5 prefix route count has spiked to {type5_count} on {device} in fabric {fabric}. Check route policy and VRF import/export targets."
  capability: bgp_evpn_peer_config
  risk_class: high

- scenario: esi_split_brain_analysis
  trigger: esi_split_brain
  required: [esi, active_links]
  question: "ESI {esi} on {device} in fabric {fabric} shows split-brain. Active links: {active_links}, expected: {expected_links}. Designated forwarder: {designated_forwarder}."
  capability: bgp_evpn_peer_state
  risk_class: critical
